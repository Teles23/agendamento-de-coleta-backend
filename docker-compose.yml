services:
  db-init:
    image: postgres:15-alpine
    container_name: coleta_db_init
    restart: "no"
    env_file:
      - .env
    command: >
      sh -c "
        export PGPASSWORD=\"$$SHARED_POSTGRES_PASSWORD\";
        until pg_isready -h \"$$SHARED_POSTGRES_HOST\" -p \"$$SHARED_POSTGRES_PORT\" -U \"$$SHARED_POSTGRES_USER\"; do
          sleep 2;
        done;
        if ! psql -h \"$$SHARED_POSTGRES_HOST\" -p \"$$SHARED_POSTGRES_PORT\" -U \"$$SHARED_POSTGRES_USER\" -d postgres -tAc \"SELECT 1 FROM pg_database WHERE datname = '$$APP_POSTGRES_DB'\" | grep -q 1; then
          psql -h \"$$SHARED_POSTGRES_HOST\" -p \"$$SHARED_POSTGRES_PORT\" -U \"$$SHARED_POSTGRES_USER\" -d postgres -v ON_ERROR_STOP=1 -c \"CREATE DATABASE \\\"$$APP_POSTGRES_DB\\\"\";
        fi
      "
    networks:
      - shared

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coleta_backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db-init:
        condition: service_completed_successfully
    ports:
      - "3020:3020"
    networks:
      - default
      - shared

  frontend:
    build:
      context: ../agendamento-de-coleta-frontend
      dockerfile: Dockerfile
    container_name: coleta_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3030:80"
    networks:
      - default

networks:
  default:
    name: coleta_default
  shared:
    external: true
